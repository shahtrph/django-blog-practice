{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Our BlogPost App</title>
  <link rel="stylesheet" href="{% static 'posts/main.css' %}" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
  <nav class="navbar">


    <div class="navbar-logo"><a href="/">
        <img class="logo" src="{% static 'posts/logo.png' %}" alt="logo" />


      </a>
    </div>
    <ul class="navbar-links">

      <li><a href="{% url 'home' %}" class="{% if request.path == '/' %}active{% endif %}">Home </a></li>
      <li><a href="{% url 'blogposts' %}" class="{% if request.path == '/blogposts' %}active{% endif %} ">My Blogpost
          Page</a></li>

      <li>
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">Sign in As: User 1</a>
      </li>
    </ul>
  </nav>
  <div class="container">
    {% block content %}
    {% endblock %}
  </div>


</body>

</html>
