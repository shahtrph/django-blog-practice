{% extends "posts/base.html" %}
{% load crispy_forms_tags %}


{% block content %}



<div class="main-container">
  <div class="topbar">
    <h1 class="title">Create a Blogpost</h1>

  </div>

  <form method='POST'>
    {% csrf_token %}
    {{form|crispy}}
    <button type="submit" class="btn btn-primary">Submit your post</button>
  </form>



</div>




{% endblock %}
